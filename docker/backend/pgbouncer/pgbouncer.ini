# pgbouncer.ini
# La sección [databases] usa wildcard para reenviar cualquier DB al postgres real.
# El host "postgres" lo resuelve Docker Compose por nombre de servicio.
[databases]
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type  = scram-sha-256
auth_file  = /tmp/pgbouncer/userlist.txt

# Usuarios autorizados a la BD virtual "pgbouncer" (SHOW POOLS/STATS/etc)
admin_users = postgres
stats_users = postgres

# ---------------------------------------------------------------
# Pool mode: transaction
# La conexión a Postgres solo se ocupa mientras hay una transacción
# activa (típicamente 5-50 ms por request). Esto permite servir
# cientos de requests simultáneos con muy pocas conexiones reales.
#
# IMPORTANTE — compatibilidad futura con FastAPI/asyncpg:
#   Al migrar, agregar en create_async_engine:
#   connect_args={"prepared_statement_cache_size": 0}
#   porque asyncpg usa prepared statements del lado del servidor
#   y son incompatibles con transaction pooling.
# ---------------------------------------------------------------
pool_mode = transaction

# Máximo de clientes conectados a pgBouncer (app + admin + tools)
max_client_conn = 500

# Conexiones reales a Postgres por (database, user).
# 2.2: subido de 20 a 40 (+10 reserva = 50 backends reales) para que coincida
# con el pool de la app (40 máx). Con Postgres max_connections=100, quedan ~50
# para migraciones/admin. La BD de ITCJ es propia (SIIAP usa otra), así que
# los 100 son para ITCJ. En transaction mode esto sirve a cientos de usuarios.
default_pool_size = 40
min_pool_size     = 5
reserve_pool_size = 10
reserve_pool_timeout = 3.0

# Transaction mode: NO necesita query de reset entre transacciones.
# (Session mode usaría "DISCARD ALL" aquí)
server_reset_query        =
server_reset_query_always = 0

# Ciclo de vida de conexiones al servidor Postgres
# Cerrar conexión inactiva a Postgres tras 10 min
server_idle_timeout = 600
# Reciclar conexión cada hora
server_lifetime     = 3600
# No desconectar clientes idle (gestionado por app)
client_idle_timeout = 0

# Stats — útil para monitoreo
stats_period = 60

# Logging a stdout (Docker-friendly; el driver json-file lo captura)
logfile =
pidfile =
