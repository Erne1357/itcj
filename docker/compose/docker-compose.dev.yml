name: itcj
services:
  redis:
    restart: always
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    restart: always
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.db
    env_file: ../../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../database/init-itcj.sh:/docker-entrypoint-initdb.d/init-itcj.sh:ro
      - ../../database/agendatec.dump:/docker-entrypoint-initdb.d/agendatec.dump:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "5432:5432"

  pgbouncer:
    build:
      context: ../backend/pgbouncer
      dockerfile: Dockerfile
    restart: always
    env_file: ../../.env    # env_file resuelve relativo al compose file → provee POSTGRES_USER/PASSWORD al contenedor
    environment:
      - TZ=America/Ciudad_Juarez
    volumes:
      - ../backend/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    #restart: always
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env
    volumes:
      - ../../:/app
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_started
    # --reload para hot-reload en desarrollo
    command: uvicorn asgi:app --host 0.0.0.0 --port 8001 --reload --log-level info
    #ports:
    #  - "8001:8001"  # Para desarrollo directo sin nginx

  nginx:
    restart: always
    image: nginx:alpine
    environment:
      TZ: America/Ciudad_Juarez
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      # Archivos estáticos de las apps
      - ../../itcj2/core/static:/www/static/core:ro
      - ../../itcj2/apps/agendatec/static:/www/static/agendatec:ro
      - ../../itcj2/apps/helpdesk/static:/www/static/helpdesk:ro
      - ../../itcj2/apps/vistetec/static:/www/static/vistetec:ro
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
