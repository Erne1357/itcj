name: itcj

services:
  # ============================================
  # INFRAESTRUCTURA
  # ============================================
  redis:
    restart: always
    image: redis:7
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    restart: always
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.db
    env_file: ../../.env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # BACKEND BLUE — Profile "blue" (FastAPI)
  # ============================================
  backend-blue:
    restart: always
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    environment:
      - INSTANCE_COLOR=blue
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../asgi.py:/app/asgi.py:ro
      - ../../migrations:/app/migrations:ro
      - ../../database:/app/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - blue

  # ============================================
  # BACKEND GREEN — Profile "green" (FastAPI)
  # ============================================
  backend-green:
    restart: always
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    environment:
      - INSTANCE_COLOR=green
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../asgi.py:/app/asgi.py:ro
      - ../../migrations:/app/migrations:ro
      - ../../database:/app/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - green

  # ============================================
  # NGINX
  # ============================================
  nginx:
    restart: always
    image: nginx:alpine
    environment:
      TZ: America/Chihuahua
    volumes:
      - ../../docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # upstream.conf generado por deploy.sh en el host
      - ../../docker/nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ../../itcj/core/static:/www/static/core:ro
      - ../../itcj/apps/agendatec/static:/www/static/agendatec:ro
      - ../../itcj/apps/helpdesk/static:/www/static/helpdesk:ro
      - ../../itcj/apps/vistetec/static:/www/static/vistetec:ro
    depends_on:
      - redis
      - postgres
    ports:
      - "127.0.0.1:8080:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
