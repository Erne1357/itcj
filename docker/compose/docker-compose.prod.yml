name: itcj

services:
  # ============================================
  # INFRAESTRUCTURA
  # ============================================
  redis:
    restart: always
    image: redis:7
    # 0.7 límites + cap de memoria seguro (noeviction: no descartar broker/holds).
    # 1.7 AOF + volumen persistente: un restart a media apertura NO evapora
    # holds / room state Socket.IO / jobs Celery encolados.
    command: ["redis-server", "--maxmemory", "768mb", "--maxmemory-policy", "noeviction", "--appendonly", "yes"]
    mem_limit: 1g
    cpus: 1.0
    volumes:
      - redisdata:/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    restart: always
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.db
    env_file: ../../.env.prod
    mem_limit: 4g
    cpus: 2.0
    # 1.9 tuning: stock (shared_buffers=128MB) desperdicia la RAM del host.
    # max_connections se deja en 100 (pgbouncer fronts). Presupuestado para
    # host compartido con SIIAP (su propio Postgres).
    command:
      - postgres
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - wal_compression=on
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - max_parallel_workers_per_gather=2
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pgbouncer:
    build:
      context: ../backend/pgbouncer
      dockerfile: Dockerfile
    restart: always
    mem_limit: 256m
    cpus: 1.0
    env_file: ../../.env.prod
    environment:
      - TZ=America/Ciudad_Juarez
    volumes:
      - ../../docker/backend/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # BACKEND BLUE — Profile "blue" (FastAPI)
  # ============================================
  backend-blue:
    restart: always
    mem_limit: 4g
    cpus: 4.0
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    environment:
      - INSTANCE_COLOR=blue
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../asgi.py:/app/asgi.py:ro
      - ../../static-manifest.json:/app/static-manifest.json:ro
      - ../../migrations:/app/migrations:ro
      - ../../database:/app/database:ro
      - ../../instance:/app/instance  # rw: sirve exports generados por Celery
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - blue

  # ============================================
  # BACKEND GREEN — Profile "green" (FastAPI)
  # ============================================
  backend-green:
    restart: always
    mem_limit: 4g
    cpus: 4.0
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    environment:
      - INSTANCE_COLOR=green
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../asgi.py:/app/asgi.py:ro
      - ../../static-manifest.json:/app/static-manifest.json:ro
      - ../../migrations:/app/migrations:ro
      - ../../database:/app/database:ro
      - ../../instance:/app/instance  # rw: sirve exports generados por Celery
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/ready"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - green

  # ============================================
  # CELERY WORKER
  # ============================================
  celery-worker:
    restart: always
    mem_limit: 2g
    cpus: 2.0
    # 2.5: worker principal — colas latency-sensitive (NO reports).
    environment:
      - CELERY_QUEUES=default,notifications
      - CELERY_HOSTNAME=worker
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../static-manifest.json:/app/static-manifest.json:ro
      - ../../docker/backend/celery:/app/docker/backend/celery:ro
      - ../../instance:/app/instance  # rw: workers leen/escriben archivos
    entrypoint: ["/bin/sh", "/app/docker/backend/celery/entrypoint-worker.sh"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # CELERY WORKER — REPORTS (cola pesada aislada: LibreOffice/Excel)
  # 2.5: un export lento ya NO bloquea notificaciones (worker separado).
  # ============================================
  celery-worker-reports:
    restart: always
    mem_limit: 2g
    cpus: 1.5
    environment:
      - CELERY_QUEUES=reports
      - CELERY_WORKER_CONCURRENCY=2
      - CELERY_SKIP_SYNC=1
      - CELERY_HOSTNAME=reports
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../static-manifest.json:/app/static-manifest.json:ro
      - ../../docker/backend/celery:/app/docker/backend/celery:ro
      - ../../instance:/app/instance  # rw: genera/escribe exports
    entrypoint: ["/bin/sh", "/app/docker/backend/celery/entrypoint-worker.sh"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # CELERY BEAT (una sola instancia, sin perfil blue/green)
  # ============================================
  celery-beat:
    restart: always
    mem_limit: 512m
    cpus: 0.5
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile.fastapi
    env_file: ../../.env.prod
    volumes:
      - ../../itcj2:/app/itcj2:ro
      - ../../static-manifest.json:/app/static-manifest.json:ro
      - ../../docker/backend/celery:/app/docker/backend/celery:ro
    entrypoint: ["/bin/sh", "/app/docker/backend/celery/entrypoint-beat.sh"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # NGINX
  # ============================================
  nginx:
    restart: always
    image: nginx:alpine
    mem_limit: 192m
    cpus: 1.0
    environment:
      TZ: America/Ciudad_Juarez
    volumes:
      - ../../docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # upstream.conf generado por deploy.sh en el host
      - ../../docker/nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ../../itcj2/core/static:/www/static/core:ro
      - ../../itcj2/apps/agendatec/static:/www/static/agendatec:ro
      - ../../itcj2/apps/helpdesk/static:/www/static/helpdesk:ro
      - ../../itcj2/apps/vistetec/static:/www/static/vistetec:ro
      - ../../itcj2/apps/maint/static:/www/static/maint:ro
      - ../../itcj2/apps/titulatec/static:/www/static/titulatec:ro
    depends_on:
      - redis
      - postgres
    ports:
      - "127.0.0.1:8080:80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  redisdata:
