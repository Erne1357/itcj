<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Directorio de Extensiones{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/directory/css/directory.css?v={{ sv('css/directory.css') }}">
</head>
<body>
  {% block body %}{% endblock %}

  <!-- HTMX + Idiomorph (morph, sin parpadeo). Idiomorph SIEMPRE después de HTMX. -->
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <script src="https://unpkg.com/idiomorph@0.7.3/dist/idiomorph-ext.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/directory/js/index.js?v={{ sv('js/index.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
