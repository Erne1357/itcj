{% extends "maint/base_maint.html" %}
{% block title %}Tickets de Mantenimiento{% endblock %}

{% block extra_css %}
<style>
.mn-status-filter {
    border: 1px solid #CFD8DC;
    background-color: #fff;
    color: var(--maint-muted);
    font-size: 0.8rem;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    transition: all 0.15s ease;
}
.mn-status-filter:hover {
    background-color: var(--maint-primary-light);
    border-color: var(--maint-accent);
    color: var(--maint-primary-dark);
}
.mn-status-filter.active {
    background-color: var(--maint-primary);
    border-color: var(--maint-primary);
    color: #fff;
    font-weight: 600;
}
</style>
{% endblock %}

{% block content %}
<div class="row align-items-center mt-3 mb-3">
    <div class="col">
        <h4 class="mb-0" style="color: var(--maint-primary-dark); font-weight: 700;">
            <i class="bi bi-clipboard-list me-2"></i>Tickets de Mantenimiento
        </h4>
    </div>
    <div class="col-auto">
        <a href="/maintenance/tickets/create" class="btn btn-maint btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Nueva Solicitud
        </a>
    </div>
</div>

<!-- Filtros -->
<div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-3">
        <!-- Status chips -->
        <div class="d-flex flex-wrap gap-2 mb-3" id="statusFilters">
            <button class="btn mn-status-filter active" data-status="">
                <i class="bi bi-grid me-1"></i>Todos
            </button>
            <button class="btn mn-status-filter" data-status="PENDING">Pendiente</button>
            <button class="btn mn-status-filter" data-status="ASSIGNED">Asignado</button>
            <button class="btn mn-status-filter" data-status="IN_PROGRESS">En Progreso</button>
            <button class="btn mn-status-filter" data-status="RESOLVED_SUCCESS">Resuelto</button>
            <button class="btn mn-status-filter" data-status="RESOLVED_FAILED">Atendido</button>
            <button class="btn mn-status-filter" data-status="CLOSED">Cerrado</button>
            <button class="btn mn-status-filter" data-status="CANCELED">Cancelado</button>
        </div>
        <!-- Otros filtros -->
        <div class="row g-2 align-items-center">
            <div class="col-md-5">
                <div class="input-group input-group-sm">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" class="form-control border-start-0 ps-0"
                           id="searchInput" placeholder="Buscar por título o número...">
                </div>
            </div>
            <div class="col-auto">
                <select class="form-select form-select-sm" id="categoryFilter" style="min-width:160px;">
                    <option value="">Todas las categorías</option>
                </select>
            </div>
            <div class="col-auto">
                <select class="form-select form-select-sm" id="priorityFilter">
                    <option value="">Todas las prioridades</option>
                    <option value="URGENTE">Urgente</option>
                    <option value="ALTA">Alta</option>
                    <option value="MEDIA">Media</option>
                    <option value="BAJA">Baja</option>
                </select>
            </div>
            <div class="col-auto ms-auto">
                <small class="text-muted" id="resultsCount"></small>
                <button class="btn btn-sm btn-outline-secondary ms-2" id="clearFilters" title="Limpiar filtros">
                    <i class="bi bi-x-circle"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Lista de tickets -->
<div id="ticketList"></div>

<!-- Paginación -->
<nav id="paginationContainer" class="mt-3 d-flex justify-content-center"></nav>
{% endblock %}

{% block extra_js %}
<script src="/static/maint/js/tickets-list.js?v={{ sv('js/tickets-list.js') }}"></script>
{% endblock %}
