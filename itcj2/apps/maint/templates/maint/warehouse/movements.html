{% extends "maint/base_maint.html" %}
{% block title %}Almacén — Movimientos{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-3 mt-2">
    <h5 class="mb-0 fw-bold" style="color:var(--maint-primary-dark);">
        <i class="bi bi-arrow-left-right me-2"></i>Historial de Movimientos
    </h5>
</div>

<div class="card border-0 shadow-sm mb-3">
    <div class="card-body py-2">
        <div class="row g-2 align-items-end">
            <div class="col-12 col-md-4">
                <select class="form-select form-select-sm" id="productFilter">
                    <option value="">Todos los productos</option>
                </select>
            </div>
            <div class="col-6 col-md-3">
                <select class="form-select form-select-sm" id="typeFilter">
                    <option value="">Todos los tipos</option>
                    <option value="ENTRY">Entrada</option>
                    <option value="CONSUMED">Consumo</option>
                    <option value="ADJUSTED_IN">Ajuste +</option>
                    <option value="ADJUSTED_OUT">Ajuste -</option>
                    <option value="RETURNED">Devolución</option>
                    <option value="VOIDED">Anulado</option>
                </select>
            </div>
            <div class="col-6 col-md-2">
                <button class="btn btn-maint btn-sm w-100" onclick="MaintWarehouseMovements.load()">
                    <i class="bi bi-search me-1"></i>Buscar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <div id="movementsContainer">
            <div class="text-center py-5">
                <div class="spinner-border" style="color:var(--maint-primary);" role="status"></div>
            </div>
        </div>
        <div id="pagination" class="d-flex justify-content-between align-items-center px-3 py-2 border-top d-none">
            <span class="text-muted small" id="paginationInfo"></span>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-secondary" id="btnPrev" onclick="MaintWarehouseMovements.prevPage()">
                    <i class="bi bi-chevron-left"></i>
                </button>
                <button class="btn btn-sm btn-outline-secondary" id="btnNext" onclick="MaintWarehouseMovements.nextPage()">
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/maint/js/warehouse/movements.js?v={{ sv('js/warehouse/movements.js') }}"></script>
{% endblock %}
