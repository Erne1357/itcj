{% extends "maint/base_maint.html" %}
{% block title %}Almacén — Categorías{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3 mt-2">
    <h5 class="mb-0 fw-bold" style="color:var(--maint-primary-dark);">
        <i class="bi bi-folder me-2"></i>Categorías del Almacén
    </h5>
    <button class="btn btn-maint btn-sm" data-bs-toggle="modal" data-bs-target="#categoryModal">
        <i class="bi bi-plus-lg me-1"></i>Nueva Categoría
    </button>
</div>

<div class="row g-3">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-header border-bottom" style="background:var(--maint-primary-light);">
                <h6 class="mb-0 fw-semibold" style="color:var(--maint-primary-dark);"><i class="bi bi-folder me-2"></i>Categorías</h6>
            </div>
            <div class="list-group list-group-flush" id="categoriesList">
                <div class="text-center py-4">
                    <div class="spinner-border spinner-border-sm" style="color:var(--maint-primary);" role="status"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-header border-bottom d-flex justify-content-between align-items-center" style="background:var(--maint-primary-light);">
                <h6 class="mb-0 fw-semibold" style="color:var(--maint-primary-dark);">
                    <i class="bi bi-folder2-open me-2"></i>Subcategorías de: <span id="selectedCatName">—</span>
                </h6>
                <button class="btn btn-sm btn-outline-secondary" id="btnNewSubcat" disabled
                    data-bs-toggle="modal" data-bs-target="#subcategoryModal">
                    <i class="bi bi-plus-lg me-1"></i>Nueva
                </button>
            </div>
            <div class="card-body p-0" id="subcategoriesList">
                <div class="text-center py-5 text-muted">
                    <i class="bi bi-arrow-left fs-3 d-block mb-2"></i>Selecciona una categoría
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block modals %}
<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0" style="background:var(--maint-primary-light);">
                <h5 class="modal-title fw-semibold" style="color:var(--maint-primary-dark);">
                    <i class="bi bi-folder me-2"></i>Categoría
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="catId">
                <div class="mb-3">
                    <label class="form-label fw-medium">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="catName" maxlength="100">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Descripción</label>
                    <textarea class="form-control" id="catDesc" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-maint btn-sm" onclick="MaintWarehouseCategories.saveCategory()">
                    <i class="bi bi-check-lg me-1"></i>Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="subcategoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0" style="background:var(--maint-primary-light);">
                <h5 class="modal-title fw-semibold" style="color:var(--maint-primary-dark);">
                    <i class="bi bi-folder2-open me-2"></i>Subcategoría
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="subcatId">
                <div class="mb-3">
                    <label class="form-label fw-medium">Nombre <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="subcatName" maxlength="100">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Descripción</label>
                    <textarea class="form-control" id="subcatDesc" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-maint btn-sm" onclick="MaintWarehouseCategories.saveSubcategory()">
                    <i class="bi bi-check-lg me-1"></i>Guardar
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/maint/js/warehouse/categories.js?v={{ sv('js/warehouse/categories.js') }}"></script>
{% endblock %}
