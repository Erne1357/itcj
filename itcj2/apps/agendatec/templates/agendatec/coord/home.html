{% extends "agendatec/base.html" %}
{% block title %}Coordinador - Inicio{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='agendatec/css/coord/home.css') }}?v={{ sv('agendatec', 'css/coord/home.css') }}">
{% endblock %}

{% block content %}
<div class="row g-2 g-md-3 at-fade-in" id="coordHomeMain">
  <div class="col-12">
    <div class="card shadow-sm">
      <div class="card-body py-2 py-md-3">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-2 mb-md-3">
          <h5 class="card-title d-flex align-items-center gap-2 mb-0 h6">
            <i class="bi bi-speedometer2" aria-hidden="true"></i>
            Panel<span class="d-none d-sm-inline"> del coordinador</span>
          </h5>
          <div class="badge bg-primary px-2 py-1 at-period-badge" id="currentPeriod">
            <i class="bi bi-calendar3" aria-hidden="true"></i>
            <span id="periodName">Cargando...</span>
          </div>
        </div>

        <!-- KPIs con skeleton durante fetch -->
        <div class="row g-2 mt-1" id="dashKpis">
          <!-- Contenido inyectado por home.js -->
        </div>

        <!-- Recordatorios -->
        <div class="border rounded-3 p-2 p-md-3 mt-2 mt-md-3" id="dashReminders">
          <div class="fw-semibold mb-2 small">
            <i class="bi bi-bell me-1" aria-hidden="true"></i> Recordatorios
          </div>
          <div id="reminderList" class="at-stagger"></div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='agendatec/js/sockets/requests_client.js') }}?v={{ sv('agendatec', 'js/sockets/requests_client.js') }}"></script>
<script src="{{ url_for('static', filename='agendatec/js/coord/home.js') }}?v={{ sv('agendatec', 'js/coord/home.js') }}"></script>
{% endblock %}
